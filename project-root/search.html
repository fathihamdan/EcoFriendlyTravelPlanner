<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eco-Search</title>

    <!-- Bootstrap -->
    <link
	href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.5/dist/css/bootstrap.min.css"
	rel="stylesheet" integrity="sha384-SgOJa3DmI69IUzQ2PVdRZhwQ+dy64/BUtbMJw1MZ8t5HZApcHrRKUc4W0kG879m7"
	crossorigin="anonymous">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="./css/global.css">
    <link rel="stylesheet" href="./css/app-pages.css">

</head>
<body>
    
<div class="d-flex">

  <!-- Sidebar -->
  <div class="sidebar d-flex flex-column justify-content-between">
    <div>
      <div class="logo mb-4">
        <img src="../assets/EcoRoam-logo.png">
      </div>

      <ul class="nav flex-column text-center">
        <li class="nav-item mb-4"><i class="bi bi-grid"></i></li>
        <li class="nav-item mb-4 active"><i class="bi bi-search"></i></li>
        <li class="nav-item mb-4"><i class="bi bi-calendar"></i></li>
        <li class="nav-item mb-4"><i class="bi bi-cloud"></i></li>
        <li class="nav-item mb-4"><i class="bi bi-calculator"></i></li>
      </ul>
    </div>

    <div class="text-center mb-3">
      <i class="bi bi-person-circle"></i>
    </div>
  </div> 

  <!-- Main Content -->
  <div class="main-content flex-grow-1 p-4">

    <!-- Header -->
    <h2 class="fw-bold text-white">Eco-Friendly Directory</h2>
    <p class="text-light mb-4">Discover sustainable travel options for your journey</p>

    <!-- Card -->
    <div class="card custom-card mb-4 p-4">
      <!-- Search bar -->
      <div class="search-box mb-3">
        <input type="text" class="form-control custom-input"
          placeholder=" Search by name, description, or city...">
      </div>

      <!-- Filters row -->
      <div class="container-fluid px-0">
          <div class="row g-3">
            <div class="col-md-3">
              <select class="form-select filter-select">
                <option>All Cities</option>
                <option>Bandaraya Melaka</option>
                <option>Kuala Terengganu</option>
                <option>Langkawi</option>
                <option>Putrajaya</option>
              </select>
            </div>
            <div class="col-md-3">
              <select class="form-select filter-select">
                <option>All Types</option>
                <option>Accommodations</option>
                <option>Activities</option>
                <option>Restaurants</option>
                <option>Transportation</option>
              </select>
            </div>
            <div class="col-md-3">
              <select class="form-select filter-select">
                <option>All Prices</option>
                <option>Budget</option>
                <option>Moderate</option>
                <option>Premium</option>
              </select>
            </div>
            <div class="col-md-3">
              <button class="btn clear-btn w-100">Clear Filters</button>
            </div>
          </div>
               

      </div>
    </div>

    <!--Favourites toggle button-->
    <div class="d-flex align-items-center mb-4">

      <div class="toggle-group">
        <button class="toggle-btn active">All Options (14)</button>
        <button class="toggle-btn">My Favorites (0)</button>
      </div>

    </div>

    <!--Places Cards-->
    <div class="row g-4" id="placesContainer"></div>

  </div>

</div>

<!-- Bootstrap Icons -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">

<script
src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.5/dist/js/bootstrap.bundle.min.js"
integrity="sha384-
k6d4wzSIapyDyv1kpU366/PK5hCdSbCRGRCMv+eplOQJWyd1fbcAu9OCUj5zNLiq"
crossorigin="anonymous"></script>
<script src="js/data.js"></script>
<script src="js/app.js"></script>

</body>
</html>

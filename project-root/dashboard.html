<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard – EcoRoam Planner</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.5/dist/css/bootstrap.min.css"
          rel="stylesheet" integrity="sha384-SgOJa3DmI69IUzQ2PVdRZhwQ+dy64/BUtbMJw1MZ8t5HZApcHrRKUc4W0kG879m7"
          crossorigin="anonymous">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="./css/global.css">
    <link rel="stylesheet" href="./css/app-pages.css">

    <style>
        /* ── Hero banner ─────────────────────────────────────────────── */
        .hero-banner {
            position: relative;
            border-radius: 18px;
            overflow: hidden;
            min-height: 190px;
            margin-bottom: 1.5rem;
            display: flex;
            align-items: flex-end;
        }

        .hero-bg {
            position: absolute;
            inset: 0;
            background: url('https://images.unsplash.com/photo-1559827260-dc66d52bef19?crop=entropy&cs=tinysrgb&fit=max&fm=jpg&q=80&w=1200')
                        no-repeat center center / cover;
            transition: transform 0.6s ease;
        }

        .hero-banner:hover .hero-bg {
            transform: scale(1.03);
        }

        .hero-overlay {
            position: absolute;
            inset: 0;
            background: linear-gradient(
                to top,
                rgba(8, 20, 28, 0.85) 0%,
                rgba(8, 20, 28, 0.35) 60%,
                transparent 100%
            );
        }

        .hero-content {
            position: relative;
            z-index: 2;
            padding: 1.8rem 2rem;
            width: 100%;
        }

        .hero-content h2 {
            font-size: 2rem;
            font-weight: 800;
            color: #fff;
            margin-bottom: 4px;
            text-shadow: 0 2px 12px rgba(0,0,0,0.4);
        }

        .hero-content p {
            color: rgba(255,255,255,0.85);
            font-size: 0.95rem;
            margin: 0;
        }

        /* ── Stat cards row ───────────────────────────────────────────── */
        .stat-row {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 1rem;
            margin-bottom: 1.5rem;
        }

        .stat-card {
            background: rgba(20, 40, 50, 0.85);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 14px;
            padding: 1.2rem 1.4rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            backdrop-filter: blur(10px);
            transition: transform 0.25s ease, box-shadow 0.25s ease;
        }

        .stat-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 28px rgba(0,0,0,0.35);
        }

        .stat-label {
            font-size: 0.72rem;
            color: #9fb3c8;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            margin-bottom: 4px;
        }

        .stat-value {
            font-size: 2rem;
            font-weight: 800;
            color: #fff;
            line-height: 1.1;
        }

        .stat-unit {
            font-size: 0.75rem;
            color: #9fb3c8;
            margin-top: 2px;
        }

        .stat-icon-wrap {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.3rem;
            flex-shrink: 0;
        }

        .stat-icon-wrap.blue   { background: rgba(59,130,246,0.18); color: #60a5fa; }
        .stat-icon-wrap.green  { background: rgba(76,175,80,0.18);  color: #4caf50; }
        .stat-icon-wrap.purple { background: rgba(168,85,247,0.18); color: #c084fc; }

        /* ── Trips section ────────────────────────────────────────────── */
        .trips-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 1rem;
        }

        .trips-header h4 {
            font-size: 1.1rem;
            font-weight: 700;
            color: #fff;
            margin: 0;
        }

        .btn-create-new {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: rgba(76,175,80,0.15);
            border: 1px solid rgba(76,175,80,0.45);
            color: #4caf50;
            padding: 7px 16px;
            border-radius: 8px;
            font-size: 0.85rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.25s ease;
            text-decoration: none;
        }

        .btn-create-new:hover {
            background: rgba(76,175,80,0.28);
            color: #6fcf72;
            transform: translateY(-1px);
        }

        /* Empty state */
        .empty-trips {
            background: rgba(20, 40, 50, 0.6);
            border: 1px dashed rgba(255,255,255,0.12);
            border-radius: 14px;
            padding: 3rem 2rem;
            text-align: center;
        }

        .empty-trips i {
            font-size: 2.6rem;
            color: #9fb3c8;
            margin-bottom: 0.75rem;
            display: block;
        }

        .empty-trips h6 {
            color: #fff;
            font-size: 1rem;
            margin-bottom: 6px;
        }

        .empty-trips p {
            color: #9fb3c8;
            font-size: 0.85rem;
            margin-bottom: 1.25rem;
        }

        .btn-create-first {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: #4caf50;
            border: none;
            color: #fff;
            padding: 10px 22px;
            border-radius: 10px;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s, transform 0.2s;
            text-decoration: none;
        }

        .btn-create-first:hover {
            background: #45a049;
            transform: translateY(-1px);
            color: #fff;
        }

        /* Trip cards grid */
        .trips-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 1rem;
        }

        .trip-card {
            background: rgba(20, 40, 50, 0.85);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 14px;
            padding: 1.25rem;
            transition: transform 0.25s ease, box-shadow 0.25s ease;
        }

        .trip-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 12px 30px rgba(0,0,0,0.35);
        }

        .trip-card-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 0.75rem;
        }

        .trip-card-title {
            font-size: 0.95rem;
            font-weight: 700;
            color: #fff;
            margin: 0;
            flex: 1;
            margin-right: 8px;
        }

        .trip-co2-badge {
            background: rgba(76,175,80,0.2);
            border: 1px solid rgba(76,175,80,0.35);
            color: #4caf50;
            font-size: 0.72rem;
            padding: 3px 9px;
            border-radius: 20px;
            white-space: nowrap;
            flex-shrink: 0;
        }

        .trip-meta {
            font-size: 0.8rem;
            color: #9fb3c8;
            display: flex;
            align-items: center;
            gap: 6px;
            margin-bottom: 5px;
        }

        .trip-meta i {
            font-size: 0.78rem;
            color: #6a8fa0;
        }

        .trip-tag {
            display: inline-block;
            background: rgba(255,255,255,0.08);
            color: #ccc;
            padding: 2px 9px;
            border-radius: 5px;
            font-size: 0.72rem;
            margin-top: 0.5rem;
        }

        .btn-view-trip {
            display: block;
            width: 100%;
            margin-top: 0.9rem;
            background: rgba(76,175,80,0.12);
            border: 1px solid rgba(76,175,80,0.35);
            color: #4caf50;
            padding: 7px;
            border-radius: 8px;
            font-size: 0.82rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            text-align: center;
            text-decoration: none;
        }

        .btn-view-trip:hover {
            background: rgba(76,175,80,0.25);
            color: #6fcf72;
        }

        /* ── Responsive ───────────────────────────────────────────────── */
        @media (max-width: 768px) {
            .stat-row { grid-template-columns: 1fr; }
            .hero-content h2 { font-size: 1.5rem; }
        }

        @media (max-width: 992px) {
            .stat-row { grid-template-columns: repeat(2, 1fr); }
        }
    </style>
</head>
<body>

<div class="d-flex">

    <!-- ── Sidebar ─────────────────────────────────────────────────── -->
    <div class="sidebar d-flex flex-column justify-content-between">
        <div>
            <div class="logo mb-4 text-center">
                <a href="dashboard.html">
                    <img src="../assets/EcoRoam-logo.png" class="logo-img">
                </a>
            </div>

            <ul class="nav flex-column text-center">
                <li class="nav-item mb-4 active">
                    <a href="dashboard.html"><i class="bi bi-grid"></i></a>
                </li>
                <li class="nav-item mb-4">
                    <a href="search.html"><i class="bi bi-search"></i></a>
                </li>
                <li class="nav-item mb-4">
                    <a href="itinerary.html"><i class="bi bi-calendar"></i></a>
                </li>
                <li class="nav-item mb-4">
                    <a href="weather.html"><i class="bi bi-cloud"></i></a>
                </li>
                <li class="nav-item mb-4">
                    <a href="carbon-calculator.html"><i class="bi bi-calculator"></i></a>
                </li>
            </ul>
        </div>

        <div class="text-center mb-3">
            <a href="profile.html"><i class="bi bi-person-circle"></i></a>
        </div>
    </div>

    <!-- ── Main Content ────────────────────────────────────────────── -->
    <div class="main-content flex-grow-1">

        <!-- Hero Banner -->
        <div class="hero-banner">
            <div class="hero-bg"></div>
            <div class="hero-overlay"></div>
            <div class="hero-content">
                <h2 id="welcomeHeading">Welcome back 🌍</h2>
                <p>Let's continue building your sustainable travel plans.</p>
            </div>
        </div>

        <!-- Stat Cards -->
        <div class="stat-row">

            <!-- Itineraries Generated -->
            <div class="stat-card">
                <div>
                    <div class="stat-label">Itineraries Generated</div>
                    <div class="stat-value" id="statItineraryCount">0</div>
                </div>
                <div class="stat-icon-wrap blue">
                    <i class="bi bi-calendar-check"></i>
                </div>
            </div>

            <!-- Carbon Footprint -->
            <div class="stat-card">
                <div>
                    <div class="stat-label">Carbon Footprint</div>
                    <div class="stat-value" id="statCarbon">0.0</div>
                    <div class="stat-unit">kg CO₂ saved</div>
                </div>
                <div class="stat-icon-wrap green">
                    <i class="bi bi-arrow-down-circle"></i>
                </div>
            </div>

            <!-- Carbon Credit Purchases -->
            <div class="stat-card">
                <div>
                    <div class="stat-label">Carbon Credit Purchases</div>
                    <div class="stat-value" id="statCredits">$0</div>
                    <div class="stat-unit">total invested</div>
                </div>
                <div class="stat-icon-wrap purple">
                    <i class="bi bi-credit-card"></i>
                </div>
            </div>

        </div>

        <!-- Your Trips -->
        <div class="trips-header">
            <h4>Your Trips</h4>
            <a href="itinerary.html" class="btn-create-new">
                <i class="bi bi-calendar-plus"></i> Create New
            </a>
        </div>

        <!-- Empty state (shown when no trips) -->
        <div class="empty-trips" id="emptyTrips">
            <i class="bi bi-flower1"></i>
            <h6>No trips yet</h6>
            <p>Start planning your first eco-friendly adventure!</p>
            <a href="itinerary.html" class="btn-create-first">
                <i class="bi bi-calendar-plus"></i> Create Your First Trip
            </a>
        </div>

        <!-- Trip cards (shown when trips exist) -->
        <div class="trips-grid" id="tripsGrid" style="display:none;"></div>

    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.5/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-k6d4wzSIapyDyv1kpU366/PK5hCdSbCRGRCMv+eplOQJWyd1fbcAu9OCUj5zNLiq"
        crossorigin="anonymous"></script>

<script src="./js/dashboard.js"></script>
</body>
</html>

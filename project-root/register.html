<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Register EcoRoam Planner</title>
  <link rel="stylesheet" href="./css/global.css" />
  <link rel="stylesheet" href="css/auth.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
</head>
<body>
  <div class="overlay"></div>

  <div class="page">
    <div class="brand">
      <div class="logo">
        <i class="fa-solid fa-location-dot"></i>
      </div>
      <h1>EcoRoam Planner</h1>
      <p>Plan your sustainable journey</p>
    </div>

    <div class="auth-card">
      <h2>Create an Account</h2>
      <p class="subtitle">Register to start planning sustainable travel.</p>

      <form id="registerForm">
        <label for="registerName">Full Name</label>
        <div class="input-box">
          <span class="icon"><i class="fa-regular fa-user"></i></span>
          <input type="text" id="registerName" placeholder="Your full name" required />
        </div>

        <label for="registerEmail">Email</label>
        <div class="input-box">
          <span class="icon"><i class="fa-regular fa-envelope"></i></span>
          <input type="email" id="registerEmail" placeholder="you@example.com" required />
        </div>

        <label for="registerPhone">Phone Number</label>
        <div class="input-box">
          <span class="icon"><i class="fa-solid fa-phone"></i></span>
          <input type="tel" id="registerPhone" placeholder="+1 234 567 8900" required />
        </div>

        <label for="registerPassword">Password</label>
        <div class="input-box">
          <span class="icon"><i class="fa-solid fa-lock"></i></span>
          <input type="password" id="registerPassword" placeholder="Create a password" required />
        </div>

        <label for="confirmPassword">Confirm Password</label>
        <div class="input-box">
          <span class="icon"><i class="fa-solid fa-lock"></i></span>
          <input type="password" id="confirmPassword" placeholder="Confirm your password" required />
        </div>

        <p class="message" id="registerMessage"></p>

        <button type="submit">Sign Up</button>
      </form>

      <p class="bottom-text">
        Already have an account?
        <a href="login.html">Sign in</a>
      </p>
    </div>

    <p class="footer-text">Join thousands of eco-conscious travelers worldwide</p>
  </div>

  <script src="js/auth.js" defer></script>
</body>
</html>

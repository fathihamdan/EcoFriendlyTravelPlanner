<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EcoRoam - My Profile</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.5/dist/css/bootstrap.min.css"
        rel="stylesheet" integrity="sha384-SgOJa3DmI69IUzQ2PVdRZhwQ+dy64/BUtbMJw1MZ8t5HZApcHrRKUc4W0kG879m7"
        crossorigin="anonymous">

    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="./css/app-pages.css">
</head>
<body>

<div class="d-flex">

    <!-- Sidebar -->
    <div class="sidebar d-flex flex-column justify-content-between">
        <div>
            <div class="logo mb-4">
                <img src="../assets/EcoRoam-logo.png" alt="EcoRoam Logo" style="width:40px;height:40px;" onerror="this.style.display='none';this.nextElementSibling.style.display='block'">
                <i class="bi bi-leaf" style="display:none;font-size:28px;"></i>
            </div>
            <ul class="nav flex-column text-center">
                <li class="nav-item mb-4" onclick="navigateTo('dashboard')"><i class="bi bi-grid"></i></li>
                <li class="nav-item mb-4" onclick="navigateTo('search')"><i class="bi bi-search"></i></li>
                <li class="nav-item mb-4" onclick="navigateTo('itinerary')"><i class="bi bi-calendar"></i></li>
                <li class="nav-item mb-4" onclick="navigateTo('weather')"><i class="bi bi-cloud"></i></li>
                <li class="nav-item mb-4" onclick="navigateTo('calculator')"><i class="bi bi-calculator"></i></li>
            </ul>
        </div>
        <div class="text-center mb-3" onclick="navigateTo('profile')">
            <i class="bi bi-person-circle"></i>
        </div>
    </div>

    <!-- Main Content -->
    <div class="main-content flex-grow-1">

        <!-- Page Header -->
        <div class="page-header mb-4">
            <h2>My Profile</h2>
            <p>Manage your details and account settings</p>
        </div>

        <!-- TOP ROW -->
        <div class="top-row">

            <!-- Avatar Card -->
            <div class="profile-card avatar-card">
                <div class="avatar-wrapper">
                    <div class="avatar-placeholder" id="avatarPlaceholder">
                        <i class="bi bi-person-fill"></i>
                    </div>
                    <div class="avatar-edit-btn" title="Change photo" onclick="triggerAvatarUpload()">
                        <i class="bi bi-pencil-fill"></i>
                    </div>
                    <input type="file" id="avatarUpload" accept="image/*" style="display: none;" onchange="uploadAvatar(this)">
                </div>
                <div class="avatar-name" id="displayName">John Doe</div>
                <div class="avatar-phone">
                    <i class="bi bi-patch-check-fill"></i>
                    <span id="displayPhone">+1 234 567 8900</span>
                </div>
            </div>

            <!-- General Info Card -->
            <div class="profile-card general-card">
                <p class="section-label">General information</p>

                <div class="info-row">
                    <div class="info-field">
                        <label>First name</label>
                        <input type="text" class="custom-input" id="firstName" placeholder="First name">
                    </div>
                    <div class="info-field">
                        <label>Last name</label>
                        <input type="text" class="custom-input" id="lastName" placeholder="Last name">
                    </div>
                </div>

                <div class="info-row">
                    <div class="info-field">
                        <label>Phone Number</label>
                        <input type="tel" class="custom-input" id="phoneField" placeholder="Phone number">
                    </div>
                </div>

                <button class="btn-update" onclick="saveProfile()">Update Profile</button>
            </div>

        </div>

        <!-- SECURITY CARD -->
        <div class="profile-card security-card">
            <h5>Security</h5>

            <div class="security-fields">
                <div class="security-field">
                    <label class="section-label">Email Address</label>
                    <input type="email" class="custom-input" id="emailField" readonly placeholder="Email address">
                </div>
            </div>

            <div>
                <button class="btn-outline-action" onclick="openModal('passwordModal')">
                    Change Password
                </button>
            </div>
        </div>

        <!-- Action Buttons -->
        <div class="action-buttons">
            <button class="btn-danger-outline" onclick="deactivateAccount()">
                Deactivate Account
            </button>
            <button class="btn-logout" onclick="logout()">
                Log Out
            </button>
        </div>

    </div>
</div>

<!-- ===== CHANGE PASSWORD MODAL ===== -->
<div class="modal-overlay" id="passwordModal">
    <div class="modal-box">
        <h5>Change Password</h5>
        <p>Update your password to keep your account secure</p>

        <div class="form-group">
            <label>Current Password</label>
            <input type="password" class="custom-input" id="currentPassword" placeholder="Enter current password">
        </div>
        <div class="form-group">
            <label>New Password</label>
            <input type="password" class="custom-input" id="newPassword" placeholder="Enter new password">
        </div>
        <div class="form-group">
            <label>Confirm New Password</label>
            <input type="password" class="custom-input" id="confirmPassword" placeholder="Confirm new password">
        </div>

        <div class="modal-footer-btns">
            <button class="btn-cancel" onclick="closeModal('passwordModal')">Cancel</button>
            <button class="btn-primary-action" onclick="changePassword()">Update Password</button>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.5/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-k6d4wzSIapyDyv1kpU366/PK5hCdSbCRGRCMv+eplOQJWyd1fbcAu9OCUj5zNLiq"
    crossorigin="anonymous"></script>

<script src="./js/profile.js"></script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eco-friendly Directories EcoRoam Planner</title>

    <!-- Bootstrap -->
    <link
	href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.5/dist/css/bootstrap.min.css"
	rel="stylesheet" integrity="sha384-SgOJa3DmI69IUzQ2PVdRZhwQ+dy64/BUtbMJw1MZ8t5HZApcHrRKUc4W0kG879m7"
	crossorigin="anonymous">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="./css/global.css">
    <link rel="stylesheet" href="./css/app-pages.css">

</head>
<body class="search-page">
    
<div class="d-flex">

  <!-- Sidebar -->
    <div class="sidebar d-flex flex-column justify-content-between">
      <div>
        <div class="logo mb-4 text-center">
          <a href="dashboard.html">
            <img src="../assets/EcoRoam-logo.png" class="logo-img">
          </a>
        </div>

        <ul class="nav flex-column text-center">
          <li class="nav-item mb-4">
            <a href="dashboard.html">
              <i class="bi bi-grid"></i>
            </a>
          </li>
          <li class="nav-item mb-4 active">
            <a href="search.html">
              <i class="bi bi-search"></i>
            </a>
          </li>
          <li class="nav-item mb-4">
            <a href="itinerary.html">
              <i class="bi bi-calendar"></i>
            </a>
          </li>
          <li class="nav-item mb-4">
            <a href="weather.html">
              <i class="bi bi-cloud"></i>
            </a>
          </li>
          <li class="nav-item mb-4">
            <a href="carbon-calculator.html">
              <i class="bi bi-calculator"></i>
            </a>
          </li>
        </ul>
      </div>

      <div class="text-center mb-3">
          <a href="profile.html">
            <i class="bi bi-person-circle"></i>
          </a>
      </div>
    </div> 

  <!-- Main Content -->
  <div class="main-content flex-grow-1 p-4">

    <!-- Header -->
    <h2 class="fw-bold text-white">Eco-Friendly Directory</h2>
    <p class="text-light mb-4">Discover sustainable travel options for your journey</p>

    <!-- Card -->
    <div class="card custom-card mb-4 p-4">
      <!-- Search bar -->
      <div class="search-box mb-3">
        <input type="text" id="searchInput" class="form-control custom-input"
          placeholder=" Search by name, city, type...">
      </div>

      <!-- Filters row -->
      <div class="container-fluid px-0">
          <div class="row g-3">
            <div class="col-md-3">
              <select id="filterLocation" class="form-select filter-select">
                <option value="">All Cities</option>
                <option>Bandaraya Melaka</option>
                <option>Kuala Terengganu</option>
                <option>Langkawi</option>
                <option>Putrajaya</option>
              </select>
            </div>
            <div class="col-md-3">
              <select id="filterType" class="form-select filter-select">
                <option value="">All Types</option>
                <option>Accommodation</option>
                <option>Activity</option>
                <option>Restaurant</option>
                <option>Transportation</option>
              </select>
            </div>
            <div class="col-md-3">
              <select id="filterPrice" class="form-select filter-select">
                <option value="">All Prices</option>
                <option>Budget</option>
                <option>Moderate</option>
                <option>Premium</option>
              </select>
            </div>
            <div class="col-md-3">
              <button id="clearFilter" class="btn clear-btn w-100">Clear Filters</button>
            </div>
          </div>
               

      </div>
    </div>

    <!--Favourites toggle button-->
    <div class="d-flex align-items-center mb-4">

      <div class="toggle-group">
        <button class="toggle-btn active" id="allBtn">All Options</button>
        <button class="toggle-btn" id="favBtn">My Favorites</button>
      </div>

    </div>

    <!--Places Cards-->
    <div class="row g-4" id="placesContainer"></div>

  </div>

</div>

<!-- Bootstrap Icons -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">

<script
src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.5/dist/js/bootstrap.bundle.min.js"
integrity="sha384-
k6d4wzSIapyDyv1kpU366/PK5hCdSbCRGRCMv+eplOQJWyd1fbcAu9OCUj5zNLiq"
crossorigin="anonymous"></script>
<script src="js/data.js"></script>
<script src="js/app.js"></script>

</body>
</html>

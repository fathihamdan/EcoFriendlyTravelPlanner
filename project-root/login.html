<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Login to EcoRoam Planner to manage your sustainable trips and travel itineraries." />
  <title>Login EcoRoam Planner</title>
  <link rel="stylesheet" href="./css/global.css" />
  <link rel="stylesheet" href="./css/auth.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
</head>
<body class="login-page">
  <div class="overlay"></div>

  <div class="page">
    <div class="brand">
      <div class="logo">
        <img src="../assets/EcoRoam-logo.png">
      </div>
      <h1>EcoRoam Planner</h1>
      <p>Plan your sustainable journey</p>
    </div>

    <div class="auth-card">
      <h2>Welcome Back</h2>
      <p class="subtitle">Sign in to your eco-friendly travel account</p>

      <form id="loginForm">
        <label for="loginEmail">Email</label>
        <div class="input-box">
          <span class="icon"><i class="fa-regular fa-envelope"></i></span>
          <input type="email" id="loginEmail" placeholder="you@example.com" autocomplete="email" required />
        </div>

        <label for="loginPassword">Password</label>
        <div class="input-box">
          <span class="icon"><i class="fa-solid fa-lock"></i></span>
          <input type="password" id="loginPassword" placeholder="Enter your password" autocomplete="current-password" required />
        </div>

        <noscript>
          <p class="message error">JavaScript is required to sign in. Please enable JavaScript in your browser.</p>
        </noscript>

        <p class="message" id="loginMessage"></p>

        <button type="submit">Sign In</button>
      </form>

      <p class="bottom-text">
        Don't have an account?
        <a href="register.html">Register now</a>
      </p>
    </div>

    <p class="footer-text">Join thousands of eco-conscious travelers worldwide</p>
  </div>

  <script src="js/auth.js" defer></script>
</body>
</html>

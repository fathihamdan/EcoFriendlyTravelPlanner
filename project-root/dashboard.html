<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard EcoRoam Planner</title>

    <!-- Bootstrap -->
    <link
	href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.5/dist/css/bootstrap.min.css"
	rel="stylesheet" integrity="sha384-SgOJa3DmI69IUzQ2PVdRZhwQ+dy64/BUtbMJw1MZ8t5HZApcHrRKUc4W0kG879m7"
	crossorigin="anonymous">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="./css/global.css">
    <link rel="stylesheet" href="./css/app-pages.css">

</head>
<body>
    
<div class="d-flex">

  <!-- Sidebar -->
  <div class="sidebar d-flex flex-column justify-content-between">
    <div>
      <div class="logo mb-4 text-center">
        <a href="dashboard.html">
          <img src="../assets/EcoRoam-logo.png" class="logo-img">
        </a>
      </div>

      <ul class="nav flex-column text-center">
        <li class="nav-item mb-4 active">
          <a href="dashboard.html">
            <i class="bi bi-grid"></i>
          </a>
        </li>
        <li class="nav-item mb-4">
          <a href="search.html">
            <i class="bi bi-search"></i>
          </a>
        </li>
        <li class="nav-item mb-4">
          <a href="itinerary.html">
            <i class="bi bi-calendar"></i>
          </a>
        </li>
        <li class="nav-item mb-4">
          <a href="weather.html">
            <i class="bi bi-cloud"></i>
          </a>
        </li>
        <li class="nav-item mb-4">
          <a href="carbon-calculator.html">
            <i class="bi bi-calculator"></i>
          </a>
        </li>
      </ul>
    </div>

    <div class="text-center mb-3">
      <a href="profile.html">
        <i class="bi bi-person-circle"></i>
      </a>
    </div>
  </div> 

  <!-- Main Content -->
  <div class="main-content flex-grow-1 p-4">

    <!-- Header -->
    <h2 class="fw-bold text-white">Page Header</h2>
    <p class="text-light mb-4">Page Subheader</p>

    <!-- Card -->
    <div class="card custom-card mb-4 p-4">
      <h5 class="text-white">Card Header</h5>
      <p class="text-muted">Card Subheader</p>

    </div>

  </div>

</div>

<!-- Bootstrap Icons -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">

<script
src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.5/dist/js/bootstrap.bundle.min.js"
integrity="sha384-
k6d4wzSIapyDyv1kpU366/PK5hCdSbCRGRCMv+eplOQJWyd1fbcAu9OCUj5zNLiq"
crossorigin="anonymous"></script>

</html>
